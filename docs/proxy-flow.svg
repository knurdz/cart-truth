<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="470" viewBox="0 0 1180 470" role="img" aria-labelledby="title desc">
  <title id="title">TorchProxies integration flow</title>
  <desc id="desc">How CartTruth loads TorchProxies configuration, routes Daraz browser contexts, and records masked proxy telemetry.</desc>
  <defs>
    <style>
      .bg { fill: #fff; }
      .box { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 14; }
      .proxy { fill: #fff7ed; stroke: #f59e0b; stroke-width: 2; rx: 14; }
      .secure { fill: #ecfdf5; stroke: #10b981; stroke-width: 2; rx: 14; }
      .data { fill: #eef2ff; stroke: #6366f1; stroke-width: 2; rx: 14; }
      .h { font: 700 22px Arial, sans-serif; fill: #0f172a; }
      .n { font: 700 16px Arial, sans-serif; fill: #0f172a; }
      .t { font: 13px Arial, sans-serif; fill: #334155; }
      .small { font: 12px Arial, sans-serif; fill: #64748b; }
      .arrow { stroke: #475569; stroke-width: 2.3; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569" />
    </marker>
  </defs>
  <rect class="bg" width="1180" height="470" />
  <text class="h" x="40" y="46">TorchProxies Integration</text>

  <rect class="proxy" x="40" y="95" width="240" height="120" />
  <text class="n" x="66" y="130">Environment</text>
  <text class="t" x="66" y="160">CARTTRUTH_TORCH_ISP_PROXY</text>
  <text class="t" x="66" y="184">host:port:user:password</text>
  <text class="small" x="66" y="205">or separate proxy fields</text>

  <rect class="box" x="345" y="95" width="220" height="120" />
  <text class="n" x="371" y="130">Proxy helpers</text>
  <text class="t" x="371" y="160">parseProxyString</text>
  <text class="t" x="371" y="184">proxyToPlaywright</text>
  <text class="t" x="371" y="208">maskProxy + fingerprint</text>

  <rect class="secure" x="630" y="95" width="220" height="120" />
  <text class="n" x="656" y="130">Runtime injection</text>
  <text class="t" x="656" y="160">Loaded once at startup</text>
  <text class="t" x="656" y="184">Passed to DarazService</text>
  <text class="t" x="656" y="208">Stored as masked summary</text>

  <rect class="proxy" x="915" y="95" width="220" height="120" />
  <text class="n" x="941" y="130">Playwright browsers</text>
  <text class="t" x="941" y="160">Search</text>
  <text class="t" x="941" y="184">Product lookup</text>
  <text class="t" x="941" y="208">Login and checkout</text>

  <line class="arrow" x1="280" y1="155" x2="345" y2="155" />
  <line class="arrow" x1="565" y1="155" x2="630" y2="155" />
  <line class="arrow" x1="850" y1="155" x2="915" y2="155" />

  <rect class="data" x="180" y="295" width="235" height="110" />
  <text class="n" x="206" y="330">proxy_events table</text>
  <text class="t" x="206" y="360">operation, source, status</text>
  <text class="t" x="206" y="384">country, pool, elapsed ms</text>

  <rect class="data" x="475" y="295" width="235" height="110" />
  <text class="n" x="501" y="330">Admin operations</text>
  <text class="t" x="501" y="360">Masked proxy summary</text>
  <text class="t" x="501" y="384">Connectivity test</text>

  <rect class="data" x="770" y="295" width="235" height="110" />
  <text class="n" x="796" y="330">Session consistency</text>
  <text class="t" x="796" y="360">Saved proxy fingerprint</text>
  <text class="t" x="796" y="384">Refresh login on change</text>

  <line class="arrow" x1="740" y1="215" x2="300" y2="295" />
  <line class="arrow" x1="740" y1="215" x2="592" y2="295" />
  <line class="arrow" x1="1025" y1="215" x2="887" y2="295" />
</svg>
