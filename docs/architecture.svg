<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="620" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc">
  <title id="title">CartTruth architecture</title>
  <desc id="desc">High-level architecture of the CartTruth web app, runtime, adapters, proxy layer, database, evidence store, API, MCP, and notification outputs.</desc>
  <defs>
    <style>
      .bg { fill: #f7fafc; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 16; }
      .accent { fill: #e6f4f1; stroke: #1f9d8a; }
      .proxy { fill: #fff4df; stroke: #d97706; }
      .data { fill: #eef2ff; stroke: #4f46e5; }
      .out { fill: #f1f5f9; stroke: #64748b; }
      .title { font: 700 24px Arial, sans-serif; fill: #0f172a; }
      .h { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .t { font: 14px Arial, sans-serif; fill: #334155; }
      .small { font: 12px Arial, sans-serif; fill: #475569; }
      .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155" />
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1180" height="620" />
  <text class="title" x="40" y="48">CartTruth System Architecture</text>
  <text class="t" x="40" y="76">A single runtime powers the dashboard, REST API, MCP tools, scheduled jobs, proxy telemetry, and Daraz checkout verification.</text>

  <rect class="card" x="40" y="120" width="210" height="150" />
  <text class="h" x="64" y="154">Users</text>
  <text class="t" x="64" y="184">Google sign-in</text>
  <text class="t" x="64" y="210">Saved Daraz links</text>
  <text class="t" x="64" y="236">Settings and API keys</text>

  <rect class="card" x="40" y="330" width="210" height="150" />
  <text class="h" x="64" y="364">Automation</text>
  <text class="t" x="64" y="394">REST API</text>
  <text class="t" x="64" y="420">MCP tools</text>
  <text class="t" x="64" y="446">Scheduled checks</text>

  <rect class="accent" x="330" y="115" width="260" height="370" rx="16" />
  <text class="h" x="360" y="154">LocalRuntime</text>
  <text class="t" x="360" y="188">Auth and roles</text>
  <text class="t" x="360" y="218">Job queue and scheduler</text>
  <text class="t" x="360" y="248">Daraz session manager</text>
  <text class="t" x="360" y="278">Proxy profile loader</text>
  <text class="t" x="360" y="308">Run recording</text>
  <text class="t" x="360" y="338">Price/stock change detection</text>
  <text class="t" x="360" y="368">Notifications</text>
  <text class="t" x="360" y="398">Admin proxy operations</text>
  <text class="small" x="360" y="440">apps/web/src/runtime.ts</text>

  <rect class="card" x="660" y="120" width="210" height="150" />
  <text class="h" x="686" y="154">Daraz Adapter</text>
  <text class="t" x="686" y="184">Product lookup</text>
  <text class="t" x="686" y="210">Login/session validation</text>
  <text class="t" x="686" y="236">Checkout extraction</text>

  <rect class="proxy" x="660" y="330" width="210" height="150" rx="16" />
  <text class="h" x="686" y="364">TorchProxies</text>
  <text class="t" x="686" y="394">ISP proxy profile</text>
  <text class="t" x="686" y="420">Playwright routing</text>
  <text class="t" x="686" y="446">Masked telemetry</text>

  <rect class="data" x="940" y="100" width="200" height="120" rx="16" />
  <text class="h" x="964" y="134">SQLite</text>
  <text class="t" x="964" y="164">Users, links, jobs</text>
  <text class="t" x="964" y="190">runs, proxy events</text>

  <rect class="data" x="940" y="250" width="200" height="120" rx="16" />
  <text class="h" x="964" y="284">Evidence Store</text>
  <text class="t" x="964" y="314">result.json</text>
  <text class="t" x="964" y="340">screenshots</text>

  <rect class="out" x="940" y="400" width="200" height="120" rx="16" />
  <text class="h" x="964" y="434">Outputs</text>
  <text class="t" x="964" y="464">Dashboard</text>
  <text class="t" x="964" y="490">REST/MCP</text>

  <line class="arrow" x1="250" y1="195" x2="330" y2="195" />
  <line class="arrow" x1="250" y1="405" x2="330" y2="405" />
  <line class="arrow" x1="590" y1="230" x2="660" y2="200" />
  <line class="arrow" x1="590" y1="360" x2="660" y2="405" />
  <line class="arrow" x1="870" y1="195" x2="940" y2="160" />
  <line class="arrow" x1="870" y1="230" x2="940" y2="310" />
  <line class="arrow" x1="870" y1="405" x2="940" y2="460" />
  <line class="arrow" x1="765" y1="330" x2="765" y2="270" />
</svg>

